<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nikolay Korea — Mini App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app">
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <main class="card">
      <div class="card-highlight"></div>

      <section class="hero">
        <div class="hero-left">
          <div class="brand">
            <div class="brand-badge">NK</div>

            <div class="brand-copy">
              <div class="brand-topline">
                <span class="brand-chip">KOREA · AUTO & PARTS</span>
              </div>

              <h1>NIKOLAY KOREA</h1>
              <p>Подбор автомобилей и автозапчастей из Южной Кореи</p>
            </div>
          </div>
        </div>
      </section>

      <div class="tabs">
        <button class="tab active" type="button" data-tab="auto">Подбор авто</button>
        <button class="tab" type="button" data-tab="parts">Автозапчасти</button>
      </div>

      <form id="leadForm" class="form">
        <input type="hidden" id="formType" name="formType" value="Подбор авто" />

        <div class="grid">
          <div class="field">
            <label for="name">Ваше имя</label>
            <input id="name" name="name" type="text" placeholder="Например: Николай" required />
          </div>

          <div class="field">
            <label for="phone">Телефон / Telegram</label>
            <input id="phone" name="phone" type="text" placeholder="+7... или @username" required />
          </div>
        </div>

        <div id="autoFields">
          <div class="grid">
            <div class="field">
              <label for="brand">Марка</label>
              <select id="brand" name="brand"></select>
            </div>

            <div class="field">
              <label for="model">Модель</label>
              <select id="model" name="model"></select>
            </div>
          </div>

          <div class="grid">
            <div class="field">
              <label for="yearFrom">Год</label>
              <select id="yearFrom" name="yearFrom"></select>
            </div>

            <div class="field">
              <label for="budget">Бюджет</label>
              <input id="budget" name="budget" type="text" inputmode="numeric" placeholder="Например: 7 000 000 ₽" />
            </div>
          </div>

          <div class="grid">
            <div class="field">
              <label for="engineVolume">Объём двигателя</label>
              <select id="engineVolume" name="engineVolume"></select>
            </div>

            <div class="field">
              <label for="mileage">Пробег до</label>
              <div class="range-wrap">
                <input id="mileage" name="mileage" type="range" min="0" max="500000" step="5000" value="80000" />
                <div class="range-value" id="mileageValue">80 000 km</div>
              </div>
            </div>
          </div>

          <div class="field">
            <label for="comment">Пожелания</label>
            <textarea id="comment" name="comment" rows="4" placeholder="Цвет, комплектация, салон, привод, сроки, город доставки..."></textarea>
          </div>
        </div>

        <div id="partsFields" class="hidden">
          <div class="grid">
            <div class="field">
              <label for="partsBrand">Марка авто</label>
              <select id="partsBrand" name="partsBrand"></select>
            </div>

            <div class="field">
              <label for="partsModel">Модель</label>
              <select id="partsModel" name="partsModel"></select>
            </div>
          </div>

          <div class="grid">
            <div class="field">
              <label for="partsYear">Год выпуска</label>
              <select id="partsYear" name="partsYear"></select>
            </div>

            <div class="field">
              <label for="vin">VIN</label>
              <input id="vin" name="vin" type="text" placeholder="Введите VIN, если есть" />
            </div>
          </div>

          <div class="grid">
            <div class="field">
              <label for="partsEngineVolume">Объём двигателя</label>
              <select id="partsEngineVolume" name="partsEngineVolume"></select>
            </div>

            <div class="field">
              <label for="partName">Название детали</label>
              <input id="partName" name="partName" type="text" placeholder="Фара, бампер, турбина..." />
            </div>
          </div>

          <div class="grid">
            <div class="field">
              <label for="article">Артикул / номер детали</label>
              <input id="article" name="article" type="text" placeholder="Если есть номер детали" />
            </div>

            <div class="field">
              <label for="partsMileage">Пробег авто</label>
              <div class="range-wrap">
                <input id="partsMileage" name="partsMileage" type="range" min="0" max="500000" step="5000" value="80000" />
                <div class="range-value" id="partsMileageValue">80 000 km</div>
              </div>
            </div>
          </div>

          <div class="field">
            <label for="partPhoto">Фото детали</label>
            <input id="partPhoto" name="partPhoto" type="file" accept="image/*" />
          </div>

          <div class="field">
            <label for="partsComment">Комментарий</label>
            <textarea id="partsComment" name="partsComment" rows="4" placeholder="Сторона, цвет, срочность, город доставки, фото детали..."></textarea>
          </div>
        </div>

        <button id="submitBtn" class="submit-btn" type="submit">
          <span>Отправить заявку</span>
        </button>

        <p id="status" class="status"></p>
      </form>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
