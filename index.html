<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nikolay Korea — Mini App</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app">
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <main class="card">
      <div class="brand">
        <div class="brand-badge">NK</div>
        <div>
          <h1>NIKOLAY KOREA</h1>
          <p>Подбор авто и автозапчастей из Южной Кореи</p>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="auto">Подбор авто</button>
        <button class="tab" data-tab="parts">Автозапчасти</button>
      </div>

      <form id="leadForm" class="form">
        <input type="hidden" id="formType" name="formType" value="Подбор авто" />

        <div class="grid">
          <div class="field">
            <label for="name">Ваше имя</label>
            <input id="name" name="name" type="text" placeholder="Например: Николай" required />
          </div>

          <div class="field">
            <label for="phone">Телефон / Telegram</label>
            <input id="phone" name="phone" type="text" placeholder="+7... или @username" required />
          </div>
        </div>

        <div id="autoFields">
          <div class="grid">
            <div class="field">
              <label for="brand">Марка</label>
              <input id="brand" name="brand" type="text" placeholder="Mercedes-Benz, BMW, Kia..." />
            </div>

            <div class="field">
              <label for="model">Модель</label>
              <input id="model" name="model" type="text" placeholder="E-Class, Sorento, Carnival..." />
            </div>
          </div>

          <div class="grid">
            <div class="field">
              <label for="yearFrom">Год от</label>
              <input id="yearFrom" name="yearFrom" type="text" placeholder="2020" />
            </div>

            <div class="field">
              <label for="budget">Бюджет</label>
              <input id="budget" name="budget" type="text" placeholder="до 3 500 000 ₽" />
            </div>
          </div>

          <div class="field">
            <label for="comment">Пожелания</label>
            <textarea id="comment" name="comment" rows="4" placeholder="Цвет, комплектация, пробег, город доставки..."></textarea>
          </div>
        </div>

        <div id="partsFields" class="hidden">
          <div class="grid">
            <div class="field">
              <label for="partsBrand">Марка авто</label>
              <input id="partsBrand" name="partsBrand" type="text" placeholder="Kia, Hyundai, Genesis..." />
            </div>

            <div class="field">
              <label for="partsModel">Модель</label>
              <input id="partsModel" name="partsModel" type="text" placeholder="Carnival, Mohave..." />
            </div>
          </div>

          <div class="grid">
            <div class="field">
              <label for="vin">VIN</label>
              <input id="vin" name="vin" type="text" placeholder="Введите VIN, если есть" />
            </div>

            <div class="field">
              <label for="partName">Название детали</label>
              <input id="partName" name="partName" type="text" placeholder="Например: фара, бампер, турбина" />
            </div>
          </div>

          <div class="field">
            <label for="partsComment">Комментарий</label>
            <textarea id="partsComment" name="partsComment" rows="4" placeholder="Артикул, фото, город доставки, уточнения..."></textarea>
          </div>
        </div>

        <button id="submitBtn" class="submit-btn" type="submit">Отправить заявку</button>
        <p id="status" class="status"></p>
      </form>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
